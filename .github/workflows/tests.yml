name: Unit Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  tests:
    name: Run tests on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    # expose the secret as an env var so it can be safely referenced in `if` expressions
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'requirements/*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # install package in editable mode so tests import the package from src/
          python -m pip install -e .
          # testing tools
          python -m pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          mkdir -p reports
          # run pytest, write JUnit XML and coverage XML per Python version
          python -m pytest --junitxml=reports/junit-${{ matrix.python-version }}.xml \
            --cov=pypublib --cov-report=xml:reports/coverage-${{ matrix.python-version }}.xml -q

      - name: Upload test reports (JUnit & coverage)
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-python-${{ matrix.python-version }}
          path: reports/*.xml

      - name: Check for JUnit report
        id: check_reports
        run: |
          if [ -f reports/junit-${{ matrix.python-version }}.xml ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish JUnit report to GitHub Checks
        if: steps.check_reports.outputs.exists == 'true'
        # Use enricomi's publisher which accepts junit XML and annotates the check
        uses: enricomi/publish-unit-test-result-action@v1
        continue-on-error: true
        with:
          files: reports/junit-${{ matrix.python-version }}.xml

      - name: Upload coverage to Codecov (with token)
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v4
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: reports/coverage-${{ matrix.python-version }}.xml
          fail_ci_if_error: true

      - name: Upload coverage to Codecov (no token)
        if: ${{ env.CODECOV_TOKEN == '' }}
        uses: codecov/codecov-action@v4
        with:
          files: reports/coverage-${{ matrix.python-version }}.xml
          fail_ci_if_error: true

